name: Build Flutter APK

on:
  workflow_dispatch:   # ستبدأ العملية يدويًا من تبويب 'Actions'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 سحب الكود من المستودع
        uses: actions/checkout@v4

      - name: 🐦 إعداد بيئة Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: 🧹 الخطوة 1: حذف مجلد Android القديم (سبب المشكلة)
        run: rm -rf accounting_ledger/android

      - name: ✨ الخطوة 2: إنشاء مجلد Android جديد وصالح
        run: |
          cd accounting_ledger
          flutter create --platforms=android .

      - name: 📦 الخطوة 3: تحميل وتثبيت dependencies المشروع
        run: |
          cd accounting_ledger
          flutter pub get

      - name: 🔨 الخطوة 4: بناء ملف APK
        run: |
          cd accounting_ledger
          flutter build apk --release

      - name: 📤 الخطوة 5: رفع ملف APK كقطعة قابلة للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: accounting_ledger/build/app/outputs/flutter-apk/app-release.apk
